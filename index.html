<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>TO-DO List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- create a container for the todo list -->
<div id="todo-container">
    <!-- todo list header -->
    <div id="header">
        <h1>Captain's Log</h1>
    </div>
    <!-- create input box -->
    <div id="todo-form">
        <input
                type="text"
                class="input-item"
                name="input_box"
                id="input_box"
                placeholder="Plot your course here..."
        />

        <!--add button -->
        <button id="input-button" onclick="addTask()">Add to the Manifest</button>
        <!-- task list -->
        <h2>Ship's Manifest</h2>
        <ul id="list-container"></ul>
    </div>
    <hr />
    <!-- task list counter -->
    <div class="counter-container">
        <div id="task-counters">
            Charted Waters: <span id="completed-counter">0</span> | Still at Sea: <span id="uncompleted-counter">0</span>
        </div>
    </div>

</div>
<script type="text/javascript" src="script.js"></script>
</body>
</html>
